<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keylytics | Professional Stenography Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="stats-bar">
        <div class="logo">Keylytics</div>
        <div class="stat-item">Timer: <span id="timer">00:00</span></div>
        <div class="stat-item">WPM: <span id="wpm">0</span></div>
        <div class="stat-item">Chars: <span id="char-count">0</span></div>
        <div class="controls">
            <button id="reset-btn">Reset</button>
        </div>
    </header>

    <main class="editor-container">
        <textarea 
            id="typing-area" 
            placeholder="Apna dictation yahan type karna shuru karein..."
            spellcheck="false"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
        ></textarea>
    </main>

    <script src="script.js"></script>
</body>
</html>
